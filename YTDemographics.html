<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 1000 US Daily Uploaders</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; color: #333; margin: 20px; }
        header { text-align: center; padding: 20px; background: #ff0000; color: white; border-radius: 8px; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; width: 300px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #eee; font-weight: bold; }
        tr:hover { background-color: #f1f1f1; }
        .rank { font-weight: bold; color: #ff0000; }
        .status-active { color: #28a745; font-weight: bold; }
        #loader { display: none; text-align: center; font-style: italic; margin: 20px; }
        .no-results { text-align: center; padding: 20px; color: #666; font-style: italic; }
    </style>
</head>
<body>

<header>
    <h1>US YouTube Daily Upload Tracker</h1>
    <p>Top 1000 Channels by Subscribers • Sorted by Most Recent Upload</p>
</header>

<div class="controls">
    <input type="text" id="apiKey" placeholder="Enter YouTube API Key">
    <button onclick="fetchTopChannels()">Generate List</button>
</div>

<div id="loader">Scanning YouTube API for active US News Channels...</div>

<table id="channelTable">
    <thead>
        <tr>
            <th>Rank</th>
            <th>Channel Name</th>
            <th>Subscribers</th>
            <th>Last Upload</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="tableBody">
        <!-- Data injected here -->
    </tbody>
</table>

<script>
async function fetchTopChannels() {
        const apiKey = document.getElementById('apiKey').value;
        if (!apiKey) {
            alert("Please enter a valid API Key");
            return;
        }

        const tableBody = document.getElementById('tableBody');
        const loader = document.getElementById('loader');
        tableBody.innerHTML = '';
        loader.style.display = 'block';

        try {
            // Searching for news-related channels in the US
            const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=50&regionCode=US&type=channel&q=news&order=relevance&key=${apiKey}`;

            const response = await fetch(searchUrl);
            const data = await response.json();

            if (data.error) throw new Error(data.error.message);

            const channels = data.items;
            
            // This counter will track the "Actual Rank" of displayed channels
            let actualRank = 1;

            if (!channels || channels.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" class="no-results">No channels found. Check your API key or connection.</td></tr>';
                return;
            }

            for (const item of channels) {
                const channelId = item.snippet.channelId;
                const channelTitle = item.snippet.title;

                // Step 1: Get channel statistics
                const statsUrl = `https://www.googleapis.com/youtube/v3/channels?part=statistics,contentDetails&id=${channelId}&key=${apiKey}`;
                const statsRes = await fetch(statsUrl);
                const statsData = await statsRes.json();
                
                if (!statsData.items || statsData.items.length === 0) continue;

                const rawSubCount = parseInt(statsData.items[0].statistics.subscriberCount);

                // Step 2: The 1 Million Subscriber Filter
                if (rawSubCount < 1000000) {
                    continue; 
                }

                const subCountDisplay = rawSubCount.toLocaleString();
                const uploadsPlaylistId = statsData.items[0].contentDetails.relatedPlaylists.uploads;

                // Step 3: Check most recent upload
                const videosUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsPlaylistId}&maxResults=1&key=${apiKey}`;
                const videoRes = await fetch(videosUrl);
                const videoData = await videoRes.json();

                if (videoData.items && videoData.items.length > 0) {
                    const lastUploadDate = new Date(videoData.items[0].snippet.publishedAt);
                    const now = new Date();
                    const hoursSinceUpload = Math.abs(now - lastUploadDate) / 36e5;

                    // Step 4: The 48-hour "Active" Filter
                    if (hoursSinceUpload <= 48) {
                        const row = `
                            <tr>
                                <td class="rank">#${actualRank}</td>
                                <td><a href="https://youtube.com/channel/${channelId}" target="_blank">${channelTitle}</a></td>
                                <td>${subCountDisplay}</td>
                                <td>${lastUploadDate.toLocaleString()}</td>
                                <td class="status-active">ACTIVE</td>
                            </tr>
                        `;
                        tableBody.innerHTML += row;
                        
                        // Increment rank only for successful matches
                        actualRank++;
                    }
                }
            }

            if (actualRank === 1) {
                tableBody.innerHTML = '<tr><td colspan="5" class="no-results">No channels with 1M+ subs uploaded in the last 48 hours.</td></tr>';
            }

        } catch (error) {
            alert("Error: " + error.message);
        } finally {
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
