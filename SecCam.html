<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Webcam Demo</title>
    <link id="favicon" rel="icon" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEirhTlEB7oDHID2L0Wp9QOVfhwykLNVVcARpu8gydNBsfQ3fuBmjpGlHXT4EpmXB7zTrLa5z6VzE4votCKwBr_Nj20-kUyRASALTxFQF0roWU_t67fL3qX-uCHyZOdq0cN5oaiLv7JwCkgvkKLw98Sh3YTlc4ZqzC2iRhOPq-MJmWB2kxReVz9sMRsVo9U/s320/security-camera-icon-video-surveillance-600nw-2498783595.webp">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-container {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 4/3;
            background-color: #333;
            border: 4px solid #4f46e5;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }
        #video-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0.75rem;
        }
        #message-box {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem;
            border-radius: 0.5rem;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <h1 class="text-3xl font-bold text-gray-800 mb-6">Webcam & Mic Access</h1>

    <div id="status" class="text-center text-lg mb-8 p-3 rounded-lg bg-yellow-100 text-yellow-800 border border-yellow-300">
        Click the button below to start.
    </div>

    <div class="video-container rounded-xl overflow-hidden mb-8">
        <!-- Muted here to prevent audio feedback loop during local testing -->
        <video id="video-feed" autoplay playsinline muted></video>
    </div>

    <button id="start-button" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-full shadow-lg transition duration-300 transform hover:scale-105 active:scale-95">
        Start Media
    </button>
    
    <div id="message-box" role="alert"></div>

    <script>
        // All logic moved here to the bottom of the body
        const video = document.getElementById('video-feed');
        const startButton = document.getElementById('start-button');
        const statusElement = document.getElementById('status');
        const messageBox = document.getElementById('message-box');
        let stream = null; 

        function displayMessage(text, isError = false) {
            messageBox.textContent = text;
            messageBox.style.display = 'block';
            messageBox.style.backgroundColor = isError ? '#dc2626' : '#10b981';
            messageBox.className = 'fixed top-20 right-20 p-3 rounded-lg text-white z-10 shadow-lg';
            
            if (isError) {
                statusElement.classList.replace('bg-yellow-100', 'bg-red-100');
                statusElement.classList.replace('text-yellow-800', 'text-red-800');
                statusElement.textContent = `Error: ${text}`;
            }
            
            setTimeout(() => { messageBox.style.display = 'none'; }, 5000);
        }

        async function startMedia() {
            if (stream) return;

            const constraints = { video: true, audio: true };

            try {
                statusElement.textContent = "Requesting permissions...";
                const mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                stream = mediaStream;
                video.srcObject = stream;
                await video.play();

                statusElement.className = "text-center text-lg mb-8 p-3 rounded-lg bg-green-100 text-green-800 border border-green-300";
                statusElement.textContent = "Live feed active (Mic & Camera).";
                startButton.textContent = "Running";
                startButton.disabled = true;

                displayMessage("Access granted!", false);
            } catch (err) {
                displayMessage(err.name === "NotAllowedError" ? "Permission denied." : "Device error.", true);
            }
        }

        startButton.addEventListener('click', startMedia);

        window.addEventListener('beforeunload', () => {
            if (stream) stream.getTracks().forEach(track => track.stop());
        });
    </script>
</body>
</html>
