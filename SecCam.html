<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam & Mic Meter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-container {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 4/3;
            background-color: #333;
            border: 4px solid #4f46e5;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }
        #video-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0.75rem;
        }
        /* Meter Styling */
        .meter-container {
            width: 100%;
            max-width: 600px;
            height: 20px;
            background-color: #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 1rem;
            border: 1px solid #d1d5db;
        }
        #volume-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, #10b981, #f59e0b, #ef4444);
            transition: width 0.1s ease-out;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <h1 class="text-3xl font-bold text-gray-800 mb-6">Webcam & Audio Meter</h1>

    <div id="status" class="text-center text-lg mb-8 p-3 rounded-lg bg-yellow-100 text-yellow-800 border border-yellow-300">
        Click start to activate media and volume meter.
    </div>

    <div class="video-container rounded-xl overflow-hidden">
        <video id="video-feed" autoplay playsinline muted></video>
    </div>

    <!-- Volume Meter UI -->
    <div class="meter-container">
        <div id="volume-bar"></div>
    </div>
    <p class="text-sm text-gray-500 mt-2 mb-8">Microphone Activity</p>

    <button id="start-button" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-full shadow-lg transition duration-300 transform hover:scale-105 active:scale-95">
        Start Media
    </button>
    
    <div id="message-box" class="hidden fixed top-20 right-20 p-3 rounded-lg text-white z-10 shadow-lg"></div>

    <script>
        const video = document.getElementById('video-feed');
        const startButton = document.getElementById('start-button');
        const statusElement = document.getElementById('status');
        const volumeBar = document.getElementById('volume-bar');
        let stream = null;
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let animationId = null;

        async function startMedia() {
            if (stream) return;

            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                video.srcObject = stream;
                await video.play();

                // Setup Audio Meter
                setupAudioMeter(stream);

                statusElement.className = "text-center text-lg mb-8 p-3 rounded-lg bg-green-100 text-green-800 border border-green-300";
                statusElement.textContent = "Live feed & Mic meter active.";
                startButton.textContent = "Running";
                startButton.disabled = true;
            } catch (err) {
                statusElement.textContent = "Error: Access denied or device missing.";
                statusElement.className = "bg-red-100 text-red-800 p-3 rounded-lg";
            }
        }

        function setupAudioMeter(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);

            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            updateMeter();
        }

        function updateMeter() {
            analyser.getByteFrequencyData(dataArray);

            // Calculate average volume level
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            let average = sum / dataArray.length;

            // Map the average (0-255) to a percentage for the CSS width
            let volumePercent = Math.min(100, (average / 128) * 100);
            volumeBar.style.width = volumePercent + "%";

            animationId = requestAnimationFrame(updateMeter);
        }

        startButton.addEventListener('click', startMedia);

        window.addEventListener('beforeunload', () => {
            if (stream) stream.getTracks().forEach(track => track.stop());
            if (audioContext) audioContext.close();
            if (animationId) cancelAnimationFrame(animationId);
        });
    </script>
</body>
</html>
